<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dairy !</title>
    <link rel="icon" type="image/x-icon" href="keyblade.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="fundo-petalas"></canvas>

    <div class="diario-container">
        <button id="btn-voltar" class="nav-btn btn-esquerda">&larr;</button>

        <div id="caderno" class="caderno">
            
            <div class="pagina capa-frontal" style="z-index: 10;">
                <div class="face frente capa-imagem"></div>
                <div class="face verso contra-capa"></div>
            </div>

            <div class="pagina" style="z-index: 9;">
                <div class="face frente folha-pautada">
                    <span class="data">Data: 12/06/2004</span>
                    <textarea placeholder="Hoje de manhã, apostei uma corrida pela ilha com Riku, e eu tinha certeza que ganharia dessa vez! Mas de novo ele me ultrapassou ;( e o pior que cai no chão e Kairi deu risada de mim, mas depois veio me ajudar a levantar"></textarea>
                </div>
                <div class="face verso folha-pautada">
                    <span class="data">Data: 07/09/200x</span>
                    <textarea placeholder="Continuação..."></textarea>
                </div>
            </div>

            <div class="pagina" style="z-index: 8;">
                <div class="face frente folha-pautada">
                    <span class="data">Data: 18/04/xxxx</span>
                    <textarea placeholder="Escreva mais aqui..."></textarea>
                </div>
                <div class="face verso folha-pautada">
                    <span class="data">Data: 15/11/202x</span>
                    <textarea placeholder="Mais pensamentos..."></textarea>
                </div>
            </div>

            <div class="pagina capa-traseira" style="z-index: 7;">
                <div class="face frente contra-capa"></div>
                <div class="face verso capa-final-cor">
                    <p class="fim-texto">bleh</p>
                </div>
            </div>

        </div>

        <button id="btn-avancar" class="nav-btn btn-direita">&rarr;</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
